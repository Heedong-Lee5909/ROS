# pilz_cartesian_limits.yaml
# Pilz Industrial Motion Planner가 사용하는 카르테시안 공간에서의
# 속도 및 가속도 제한을 정의하는 파일이에요.
#
# Pilz Industrial Motion Planner란?
# 독일 자동화 기업 Pilz가 개발한 MoveIt 경로 계획 플러그인이에요.
# 일반 플래너(OMPL)와 달리 항상 동일하고 예측 가능한 경로를 보장해요.
# PTP(점 대 점), LIN(직선), CIRC(원형) 세 가지 동작 유형을 지원해요.
# 산업 현장에서 로봇이 정확히 직선으로 움직여야 할 때 주로 사용해요.
#
# 카르테시안 공간이란?
# 우리가 일상에서 쓰는 X, Y, Z 좌표 공간이에요.
# 관절 공간(각 관절의 각도)과 달리 사람이 직관적으로 이해할 수 있어요.
# 예: "그리퍼를 앞으로 30cm, 위로 20cm 이동해" 같은 방식으로 표현해요.
# MoveIt은 카르테시안 좌표로 목표를 받으면 역기구학으로
# 관절 각도를 계산해서 로봇을 움직여요.

cartesian_limits:
  # 직선 방향 최대 속도 (m/s)
  # 그리퍼가 카르테시안 공간에서 이동할 수 있는 최대 선속도예요
  max_trans_vel: 1.0

  # 직선 방향 최대 가속도 (m/s²)
  # 속도를 높일 때 적용되는 최대 가속도예요
  max_trans_acc: 2.25

  # 직선 방향 최대 감속도 (m/s²)
  # 음수값으로 속도를 줄일 때 적용되는 최대 감속도예요
  max_trans_dec: -5.0

  # 회전 방향 최대 속도 (rad/s)
  # 그리퍼가 회전할 수 있는 최대 각속도예요 (1.57 rad/s ≈ 90도/s)
  max_rot_vel: 1.57