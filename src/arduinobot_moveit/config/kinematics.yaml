# kinematics.yaml
# MoveIt이 역기구학(Inverse Kinematics)을 풀 때 사용할
# 솔버(Solver) 설정을 정의하는 파일이에요.
# 역기구학이란 그리퍼의 목표 위치를 입력하면
# 각 관절이 몇 도 움직여야 하는지 계산하는 것이에요.

arm:  # SRDF에서 정의한 arm 그룹에 대한 설정
  
  # 역기구학 풀이에 사용할 플러그인
  # KDL(Kinematics and Dynamics Library) 은 ROS에서 기본으로 제공하는 IK 솔버예요
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  
  # IK 풀이 시 관절 각도 탐색 간격 (rad)
  # 값이 작을수록 정밀하지만 계산 시간이 늘어나요
  kinematics_solver_search_resolution: 0.005
  
  # IK 풀이 최대 허용 시간 (초)
  # 이 시간 안에 해를 못 찾으면 실패로 처리해요
  kinematics_solver_timeout: 0.005
  
  # 위치만 고려하는 IK 사용 여부
  # True: 위치(x, y, z)만 맞추고 방향(roll, pitch, yaw)은 무시해요
  # 우리 로봇은 자유도가 3개라 방향까지 제어가 불가능하므로 True로 설정해요
  position_only_ik: True